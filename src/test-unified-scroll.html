<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Unified Scroll Sync Test</title>
<link rel="stylesheet" href="lib/codemirror/codemirror.css">
<style>
body { margin: 0; font-family: sans-serif; }
.editor-container { display: flex; height: 100vh; overflow: hidden; }
.editor-pane { flex: 1; min-height: 0; overflow: hidden; position: relative; }
#editor-wrapper { height: 100%; }
.CodeMirror { height: 100% !important; font-size: 14px; }
.preview-pane { flex: 1; min-height: 0; overflow: hidden; padding: 20px; display: flex; flex-direction: column; }
#preview { flex: 1; overflow-y: auto; }
</style>
</head>
<body>
<div class="editor-container">
  <div class="editor-pane">
    <div id="editor-wrapper"><textarea id="editor-textarea"></textarea></div>
  </div>
  <div class="preview-pane">
    <div id="preview"></div>
  </div>
</div>

<script src="lib/codemirror/codemirror.js"></script>
<script src="lib/codemirror/addon/mode/overlay.js"></script>
<script src="lib/codemirror/mode/markdown/markdown.js"></script>
<script src="lib/codemirror/mode/gfm/gfm.js"></script>
<script src="lib/unified-bundle.js"></script>
<script>
// Initialize CodeMirror
const cm = CodeMirror.fromTextArea(document.getElementById('editor-textarea'), {
  mode: 'gfm',
  lineNumbers: true,
  lineWrapping: true,
  theme: 'default'
});

// Load demo.md
fetch('demo.md')
  .then(r => r.text())
  .then(content => {
    cm.setValue(content);
    cm.refresh();
    renderAndSync();
  });

function renderAndSync() {
  const content = cm.getValue();
  const html = UnifiedRenderer.renderMarkdown(content);
  document.getElementById('preview').innerHTML = html;

  // Build position arrays
  buildPositionArrays();

  console.log('Preview children:', document.getElementById('preview').children.length);
  console.log('Editor elements:', window._editorArr.length);
  console.log('Preview elements:', window._previewArr.length);
}

function getOffsetTop(el) {
  let top = el.offsetTop;
  let parent = el.offsetParent;
  const preview = document.getElementById('preview');
  while (parent && parent !== preview) {
    top += parent.offsetTop;
    parent = parent.offsetParent;
  }
  return top;
}

function getSourceLine(el) {
  if (el.dataset && el.dataset.sourceLine) return parseInt(el.dataset.sourceLine, 10);
  const inner = el.querySelector('[data-source-line]');
  if (inner) return parseInt(inner.dataset.sourceLine, 10);
  return null;
}

function buildPositionArrays() {
  const preview = document.getElementById('preview');
  const children = Array.from(preview.children).filter(el => el.nodeType === 1);
  const editorArr = [], previewArr = [];

  for (let i = 0; i < children.length; i++) {
    const sourceLine = getSourceLine(children[i]);
    if (sourceLine === null) continue;
    editorArr.push(cm.heightAtLine(Math.max(0, sourceLine - 1), 'local'));
    previewArr.push(getOffsetTop(children[i]));
  }

  window._editorArr = editorArr;
  window._previewArr = previewArr;
  window._previewChildren = children;
}

// Scroll sync
let _canScroll = { editor: true, preview: true };
let _throttleTimer = null;
let _throttlePending = null;
let _debounceTimer = null;

function throttleScroll(fn, delay) {
  if (_throttleTimer) { _throttlePending = fn; return; }
  fn();
  _throttleTimer = setTimeout(() => {
    _throttleTimer = null;
    if (_throttlePending) {
      const pending = _throttlePending;
      _throttlePending = null;
      throttleScroll(pending, delay);
    }
  }, delay);
}

function resumeScroll() {
  _canScroll.editor = true;
  _canScroll.preview = true;
}

function debounceScroll(fn, delay) {
  clearTimeout(_debounceTimer);
  _debounceTimer = setTimeout(fn, delay);
}

// Editor → Preview sync
function syncEditorToPreview() {
  buildPositionArrays();
  const { scrollHeight, clientHeight } = preview;
  const info = cm.getScrollInfo();

  if (info.top + info.clientHeight >= info.height - 0.5) {
    preview.scrollTop = Math.max(0, scrollHeight - clientHeight);
    return;
  }
  if (info.top <= 0.5) {
    preview.scrollTop = 0;
    return;
  }

  const top = info.top;
  let idx = -1;
  for (let i = 0; i < window._editorArr.length; i++) {
    if (top < window._editorArr[i]) { idx = i - 1; break; }
  }
  if (idx < 0) idx = window._editorArr.length - 1;
  if (idx < 0) return;
  if (idx >= window._editorArr.length - 1) {
    preview.scrollTop = Math.max(0, scrollHeight - clientHeight);
    return;
  }

  const ratio = (top - window._editorArr[idx]) / (window._editorArr[idx + 1] - window._editorArr[idx]);
  preview.scrollTop = ratio * (window._previewArr[idx + 1] - window._previewArr[idx]) + window._previewArr[idx];
}

// Preview → Editor sync
function syncPreviewToEditor() {
  buildPositionArrays();
  const { scrollTop, scrollHeight, clientHeight } = preview;
  const info = cm.getScrollInfo();

  if (scrollTop + clientHeight >= scrollHeight - 0.5) {
    cm.scrollTo(0, Math.max(0, info.height - info.clientHeight));
    return;
  }
  if (scrollTop <= 0.5) {
    cm.scrollTo(0, 0);
    return;
  }

  let idx = -1;
  for (let i = 0; i < window._previewArr.length; i++) {
    if (scrollTop < window._previewArr[i]) { idx = i - 1; break; }
  }
  if (idx < 0) idx = window._previewArr.length - 1;
  if (idx < 0) return;
  if (idx >= window._previewArr.length - 1) {
    cm.scrollTo(0, Math.max(0, info.height - info.clientHeight));
    return;
  }

  const ratio = (scrollTop - window._previewArr[idx]) / (window._previewArr[idx + 1] - window._previewArr[idx]);
  const editorScrollTop = ratio * (window._editorArr[idx + 1] - window._editorArr[idx]) + window._editorArr[idx];
  cm.scrollTo(0, editorScrollTop);
}

// Event handlers
const preview = document.getElementById('preview');

cm.on('scroll', () => {
  if (!_canScroll.editor) return;
  _canScroll.preview = false;
  throttleScroll(syncEditorToPreview, 50);
  debounceScroll(resumeScroll, 100);
});

preview.addEventListener('scroll', () => {
  if (!_canScroll.preview) return;
  _canScroll.editor = false;
  throttleScroll(syncPreviewToEditor, 50);
  debounceScroll(resumeScroll, 100);
});

// Log sync events
let lastLog = 0;
preview.addEventListener('scroll', () => {
  const now = Date.now();
  if (now - lastLog > 2000) {
    lastLog = now;
    console.log('Sync state - Editor scrollTop:', Math.round(cm.getScrollInfo().top),
                'Preview scrollTop:', Math.round(preview.scrollTop));
  }
});

console.log('Test page ready. Scroll either panel to test sync.');
console.log('window._editorArr length:', window._editorArr ? window._editorArr.length : 0);
console.log('window._previewArr length:', window._previewArr ? window._previewArr.length : 0);
</script>
</body>
</html>
