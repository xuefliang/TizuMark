<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFEFA"/>
      <stop offset="100%" stop-color="#FFF6E5"/>
    </linearGradient>
  </defs>

  <!-- Rounded square -->
  <rect x="12" y="12" width="232" height="232" rx="54" ry="54" fill="url(#bg6)"/>
  <rect x="14" y="14" width="228" height="228" rx="52" ry="52" fill="none" stroke="#ECDAB6" stroke-width="1.5"/>

  <!-- Single # watermark — upper-right -->
  <g transform="translate(176, 62)" opacity="0.05">
    <rect x="0" y="0" width="13" height="105" rx="6" fill="#0A2540"/>
    <rect x="40" y="0" width="13" height="105" rx="6" fill="#0A2540"/>
    <rect x="-10" y="9" width="72" height="13" rx="6" fill="#0A2540"/>
    <rect x="-10" y="83" width="72" height="13" rx="6" fill="#0A2540"/>
  </g>

  <!-- Pure simple M — two-tone, bold -->
  <g transform="translate(128, 126)">

    <!-- Left mast -->
    <rect x="-45" y="-58" width="20" height="112" rx="2" fill="#0C2840"/>

    <!-- Right mast -->
    <rect x="25" y="-58" width="20" height="112" rx="2" fill="#0C2840"/>

    <!-- Left V -->
    <path d="M -25,-58 L -3,28 L -3,54 L -20,54 L -38,-14 Z" fill="#1A62A8"/>

    <!-- Right V -->
