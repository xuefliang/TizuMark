<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFEFA"/>
      <stop offset="100%" stop-color="#FFF4E0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square -->
  <rect x="12" y="12" width="232" height="232" rx="54" ry="54" fill="url(#bg2)"/>
  <rect x="14" y="14" width="228" height="228" rx="52" ry="52" fill="none" stroke="#E8D5B0" stroke-width="1.5"/>

  <!--
    # 暗纹 — offset to upper-left, even subtler
    Only visible on close inspection, like paper texture
  -->
  <g transform="translate(100, 98)" opacity="0.06">
    <rect x="0" y="0" width="16" height="132" rx="8" fill="#081E36"/>
    <rect x="52" y="0" width="16" height="132" rx="8" fill="#081E36"/>
    <rect x="-12" y="12" width="92" height="16" rx="8" fill="#081E36"/>
    <rect x="-12" y="104" width="92" height="16" rx="8" fill="#081E36"/>
  </g>

  <!--
    Clean geometric M — centered, bold, no decoration
  -->
  <g transform="translate(128, 127)">

    <!-- Left vertical -->
    <rect x="-50" y="-60" width="20" height="114" rx="2" fill="#0A2540"/>

    <!-- Right vertical -->
    <rect x="30" y="-60" width="20" height="114" rx="2" fill="#0A2540"/>

    <!-- Left V -->
    <path d="M -30,-60 L -4,28 L -4,54 L -22,54 L -44,-16 Z" fill="#1A5688"/>

    <!-- Right V -->
    <path d="M 30,-60 L 44,-60 L 44,-16 L 22,54 L 4,54 L 4,28 Z" fill="#2E82C8"/>

    <!-- V bottom highlight -->
    <path d="M -4,28 L 4,28 L 0,44 Z" fill="#54AAE0"/>

    <!-- Gold line top -->
    <rect x="-64" y="-68" width="128" height="4" rx="2" fill="#C8892A"/>

    <!-- Gold line bottom -->
    <rect x="-64" y="60" width="128" height="4" rx="2" fill="#C8892A"/>

  </g>
</svg>
