<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFDF8"/>
      <stop offset="100%" stop-color="#FFF6E5"/>
    </linearGradient>
  </defs>

  <!-- Rounded square -->
  <rect x="12" y="12" width="232" height="232" rx="54" ry="54" fill="url(#bg3)"/>
  <rect x="14" y="14" width="228" height="228" rx="52" ry="52" fill="none" stroke="#EBDAB8" stroke-width="1.5"/>

  <!--
    # 暗纹 as subtle diagonal slash marks
    Integrated into background — barely there
  -->
  <g opacity="0.05">
    <!-- Subtle # marks scattered like paper grain -->
    <g transform="translate(60, 60)">
      <rect x="0" y="0" width="12" height="100" rx="6" fill="#0A2540"/>
      <rect x="40" y="0" width="12" height="100" rx="6" fill="#0A2540"/>
      <rect x="-8" y="8" width="68" height="12" rx="6" fill="#0A2540"/>
      <rect x="-8" y="80" width="68" height="12" rx="6" fill="#0A2540"/>
    </g>
    <g transform="translate(128, 72)">
      <rect x="0" y="0" width="10" height="80" rx="5" fill="#0A2540"/>
      <rect x="32" y="0" width="10" height="80" rx="5" fill="#0A2540"/>
      <rect x="-6" y="6" width="54" height="10" rx="5" fill="#0A2540"/>
      <rect x="-6" y="64" width="54" height="10" rx="5" fill="#0A2540"/>
    </g>
  </g>

  <!--
    M — pure, minimal, no gold lines
    Just the geometric letterform
  -->
  <g transform="translate(128, 126)">

    <!-- Left vertical -->
    <rect x="-46" y="-58" width="20" height="112" rx="2" fill="#0A2540"/>

    <!-- Right vertical -->
    <rect x="26" y="-58" width="20" height="112" rx="2" fill="#0A2540"/>

    <!-- Left V -->
    <path d="M -26,-58 L -4,28 L -4,54 L -20,54 L -40,-16 Z" fill="#1A5688"/>

    <!-- Right V -->
    <path d="M 26,-58 L 40,-58 L 40,-16 L 20,54 L 4,54 L 4,28 Z" fill="#2E82C8"/>

    <!-- V bottom — light blue accent -->
    <path d="M -4,28 L 4,28 L 0,42 Z" fill="#54AAE0"/>

    <!-- Single gold dot — one focal point only -->
    <circle cx="0" cy="-6" r="5" fill="#C8892A"/>

  </g>
</svg>
