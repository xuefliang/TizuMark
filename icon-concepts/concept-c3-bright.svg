<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F7F4ED"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background — crisp white -->
  <rect x="16" y="16" width="224" height="224" rx="56" ry="56" fill="url(#bgB)"/>
  <rect x="18" y="18" width="220" height="220" rx="54" ry="54" fill="none" stroke="#E5E0D5" stroke-width="1"/>

  <!-- Bold geometric M -->
  <g transform="translate(128, 130)">

    <!-- Left mast -->
    <rect x="-58" y="-64" width="20" height="114" rx="2" fill="#C53030"/>

    <!-- Right mast -->
    <rect x="38" y="-64" width="20" height="114" rx="2" fill="#C53030"/>

    <!-- Left diagonal -->
    <polygon points="-38,-64 -20,-64 -4,28 -4,50 -20,50 -42,4" fill="#E53E3E"/>

    <!-- Right diagonal -->
    <polygon points="20,-64 38,-64 42,4 20,50 4,50 4,28" fill="#FC8181"/>

    <!-- Center V notch -->
    <polygon points="-6,26 6,26 0,16" fill="#FEB2B2"/>

    <!-- Gold top line -->
    <rect x="-58" y="-72" width="116" height="3" rx="1.5" fill="#D69E2E"/>

    <!-- Gold bottom line -->
    <rect x="-58" y="61" width="116" height="3" rx="1.5" fill="#D69E2E"/>

    <!-- Gold dots -->
    <circle cx="-4" cy="-6" r="4.5" fill="#D69E2E"/>
    <circle cx="4" cy="-6" r="4.5" fill="#D69E2E"/>
    <circle cx="0" cy="-6" r="2" fill="#B7791F"/>
  </g>
</svg>
