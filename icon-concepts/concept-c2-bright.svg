<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFBF0"/>
      <stop offset="100%" stop-color="#FFF5DC"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background — warm cream -->
  <rect x="16" y="16" width="224" height="224" rx="56" ry="56" fill="url(#bgA)"/>
  <rect x="18" y="18" width="220" height="220" rx="54" ry="54" fill="none" stroke="#E8DCC8" stroke-width="1"/>

  <!-- Geometric M — folded planes -->
  <g transform="translate(128, 134)">

    <!-- Shadow plane (deepest) -->
    <path d="M -58,-60 L -40,-60 L -40,50 L -58,50 Z" fill="#1E3A5F"/>

    <!-- Right stem -->
    <path d="M 40,-60 L 58,-60 L 58,50 L 40,50 Z" fill="#1E3A5F"/>

    <!-- Left V descender -->
    <path d="M -40,-60 L -6,26 L -6,50 L -22,50 L -46,-26 L -46,-60 Z" fill="#2C5282"/>

    <!-- Right V descender -->
    <path d="M 40,-60 L 46,-60 L 46,-26 L 22,50 L 6,50 L 6,26 Z" fill="#3182CE"/>

    <!-- Top gold accent -->
    <rect x="-76" y="-68" width="152" height="4" rx="2" fill="#D69E2E"/>

    <!-- Bottom gold accent -->
    <rect x="-76" y="54" width="152" height="4" rx="2" fill="#D69E2E"/>

    <!-- Center dot -->
    <circle cx="0" cy="-4" r="5" fill="#D69E2E"/>
  </g>
</svg>
