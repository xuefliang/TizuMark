<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgV5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141517"/>
      <stop offset="100%" stop-color="#1E1F23"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="224" height="224" rx="56" ry="56" fill="url(#bgV5)"/>

  <!--
    "Typewriter M" — inspired by vintage typography
    Strong serif-like terminals, rhythmic proportions
    Cream/ivory on dark — timeless, warm
  -->
  <g transform="translate(128, 132)">

    <!-- LEFT STEM with serif terminals -->
    <path d="
      M -52,-68 L -34,-68 L -34,56 L -52,56 Z
    " fill="#F2EEE8"/>

    <!-- LEFT STEM top serif -->
    <rect x="-56" y="-72" width="24" height="8" rx="2" fill="#F2EEE8"/>

    <!-- LEFT STEM bottom serif -->
    <rect x="-56" y="48" width="24" height="12" rx="2" fill="#F2EEE8"/>


    <!-- RIGHT STEM -->
    <path d="
      M 34,-68 L 52,-68 L 52,56 L 34,56 Z
    " fill="#F2EEE8"/>

    <!-- RIGHT STEM top serif -->
    <rect x="32" y="-72" width="24" height="8" rx="2" fill="#F2EEE8"/>

    <!-- RIGHT STEM bottom serif -->
    <rect x="32" y="48" width="24" height="12" rx="2" fill="#F2EEE8"/>


    <!-- LEFT DIAGONAL (V shape) -->
    <path d="
      M -34,-68 L -20,-68 L -6,32 L -6,56 L -20,50 L -40,-8 Z
    " fill="#D9D2C7"/>

    <!-- RIGHT DIAGONAL -->
    <path d="
      M 20,-68 L 34,-68 L 40,-8 L 20,50 L 6,56 L 6,32 Z
    " fill="#E3DDD4"/>

    <!-- CENTER V BOTTOM notch -->
    <path d="
      M -6,32 L 6,32 L 0,46 Z
    " fill="#C5BDB0"/>

    <!--
      GOLDEN RULE accent — a single golden line crossing
      through the M, symbolizing text/cursor
    -->
    <rect x="-52" y="-12" width="104" height="3" rx="1.5" fill="#C9A055"/>

    <!-- Small cursor blink dot on the line -->
    <circle cx="56" cy="-10.5" r="3" fill="#C9A055"/>

  </g>
</svg>
