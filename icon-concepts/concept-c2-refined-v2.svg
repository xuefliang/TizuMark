<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFEF9"/>
      <stop offset="100%" stop-color="#FFF5E0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="10" y="10" width="236" height="236" rx="54" ry="54" fill="url(#bg2)"/>

  <!-- Defined border -->
  <rect x="12" y="12" width="232" height="232" rx="52" ry="52" fill="none" stroke="#EAD9B8" stroke-width="2"/>

  <!-- Bold architectural M — heavier geometry -->
  <g transform="translate(128, 126)">

    <!-- LEFT MAST — deep navy, slightly wider -->
    <rect x="-55" y="-68" width="22" height="126" rx="3" fill="#0A2540"/>

    <!-- RIGHT MAST -->
    <rect x="33" y="-68" width="22" height="126" rx="3" fill="#0A2540"/>

    <!-- LEFT V-DESCENDER -->
    <path d="M -33,-68 L -3,34 L -3,58 L -25,58 L -48,-22 Z" fill="#174F82"/>

    <!-- RIGHT V-DESCENDER -->
    <path d="M 33,-68 L 48,-68 L 48,-22 L 25,58 L 3,58 L 3,34 Z" fill="#2672B8"/>

    <!-- CENTER V BOTTOM highlight -->
    <path d="M -3,34 L 3,34 L 0,52 Z" fill="#4A9ED8"/>

    <!-- TOP GOLD BAR — prominent -->
    <rect x="-70" y="-76" width="140" height="6" rx="3" fill="#C88020"/>

    <!-- BOTTOM GOLD BAR -->
    <rect x="-70" y="64" width="140" height="6" rx="3" fill="#C88020"/>

    <!-- GOLD CENTER ACCENT — larger -->
    <circle cx="0" cy="-2" r="7" fill="#C88020"/>

    <!-- GOLD SIDE ACCENTS -->
    <rect x="-50" y="-5" width="8" height="3" rx="1.5" fill="#C88020"/>
    <rect x="42" y="-5" width="8" height="3" rx="1.5" fill="#C88020"/>

    <!-- Markdown # accent — subtle nod -->
    <g transform="translate(64, 38)" opacity="0.3">
      <rect x="0" y="0" width="3.5" height="14" rx="1.5" fill="#0A2540"/>
      <rect x="8" y="0" width="3.5" height="14" rx="1.5" fill="#0A2540"/>
      <rect x="-1" y="4" width="13" height="3" rx="1.5" fill="#0A2540"/>
      <rect x="-1" y="9" width="13" height="3" rx="1.5" fill="#0A2540"/>
    </g>
  </g>
</svg>
