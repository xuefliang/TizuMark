<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C0E15"/>
      <stop offset="50%" stop-color="#1A1D2E"/>
      <stop offset="100%" stop-color="#0C0E15"/>
    </linearGradient>
    <linearGradient id="mLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="mRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="mAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="224" height="224" rx="54" ry="54" fill="url(#bgC)"/>

  <!-- Subtle glow behind M -->
  <circle cx="128" cy="120" r="80" fill="rgba(139,92,246,0.08)"/>
  <circle cx="128" cy="120" r="50" fill="rgba(139,92,246,0.06)"/>

  <!-- Stylized geometric M (for Markdown) -->
  <g transform="translate(128, 132)">
    <!-- Left stem -->
    <path d="M -56,40 L -56,-62 L -42,-62 L -42,40 Z" fill="url(#mLeft)" rx="4"/>
    <rect x="-56" y="-62" width="14" height="102" rx="7" fill="url(#mLeft)"/>

    <!-- Middle V (left diagonal) -->
    <path d="M -42,-62 L -6,20 L -6,40 L -42,-40 Z" fill="url(#mAccent)"/>
    <polygon points="-42,-62 -6,20 -6,40 -42,-40" fill="url(#mAccent)"/>

    <!-- Middle V (right diagonal) -->
    <path d="M 6,20 L 42,-62 L 42,-40 L 6,40 Z" fill="url(#mAccent)"/>
    <polygon points="6,20 42,-62 42,-40 6,40" fill="url(#mAccent)"/>

    <!-- Right stem -->
    <rect x="42" y="-62" width="14" height="102" rx="7" fill="url(#mRight)"/>
  </g>

  <!-- Subtle hash mark accent -->
  <g transform="translate(60, 180)" opacity="0.15">
    <rect x="0" y="0" width="8" height="18" rx="4" fill="#C4B5FD"/>
    <rect x="18" y="0" width="8" height="18" rx="4" fill="#C4B5FD"/>
    <rect x="-6" y="4" width="38" height="3" rx="1.5" fill="#C4B5FD"/>
    <rect x="-6" y="11" width="38" height="3" rx="1.5" fill="#C4B5FD"/>
  </g>
</svg>
