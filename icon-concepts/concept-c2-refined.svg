<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFDF7"/>
      <stop offset="100%" stop-color="#FFF8E7"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="12" y="12" width="232" height="232" rx="56" ry="56" fill="url(#bg)"/>

  <!-- Subtle outer ring for definition -->
  <rect x="14" y="14" width="228" height="228" rx="54" ry="54" fill="none" stroke="#E5D5B5" stroke-width="1.5"/>

  <!-- Inner shadow ring for depth -->
  <rect x="12" y="12" width="232" height="232" rx="56" ry="56" fill="none" stroke="rgba(0,0,0,0.04)" stroke-width="3"/>

  <!-- Geometric M — bolder, more contrast -->
  <g transform="translate(128, 129)">

    <!-- LEFT STEM — deepest navy -->
    <rect x="-56" y="-66" width="20" height="120" rx="2" fill="#0F2B4A"/>

    <!-- RIGHT STEM — deepest navy -->
    <rect x="36" y="-66" width="20" height="120" rx="2" fill="#0F2B4A"/>

    <!-- LEFT V descender — mid blue -->
    <path d="M -36,-66 L -4,30 L -4,54 L -22,54 L -46,-18 Z" fill="#1B5A8C"/>

    <!-- RIGHT V descender — bright blue -->
    <path d="M 36,-66 L 46,-66 L 46,-18 L 22,54 L 4,54 L 4,30 Z" fill="#2980C8"/>

    <!-- CENTER V bottom — lightest blue highlight -->
    <path d="M -4,30 L 4,30 L 0,48 Z" fill="#5BA3DE"/>

    <!-- TOP GOLD BAR — thick, visible at any size -->
    <rect x="-70" y="-72" width="140" height="5" rx="2.5" fill="#C8892A"/>

    <!-- BOTTOM GOLD BAR -->
    <rect x="-70" y="60" width="140" height="5" rx="2.5" fill="#C8892A"/>

    <!-- CENTER GOLD DOT — larger for visibility -->
    <circle cx="0" cy="-3" r="6" fill="#C8892A"/>

    <!-- LEFT GOLD DOT -->
    <circle cx="-46" cy="-3" r="2.5" fill="#C8892A"/>

    <!-- RIGHT GOLD DOT -->
    <circle cx="46" cy="-3" r="2.5" fill="#C8892A"/>

  </g>
</svg>
