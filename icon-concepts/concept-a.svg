<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1B2F"/>
      <stop offset="100%" stop-color="#2D3154"/>
    </linearGradient>
    <linearGradient id="accentA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8E6F0"/>
      <stop offset="100%" stop-color="#C5C1D9"/>
    </linearGradient>
    <linearGradient id="goldA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0D78C"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="224" height="224" rx="52" ry="52" fill="url(#bgA)"/>

  <!-- Subtle inner border -->
  <rect x="16" y="16" width="224" height="224" rx="52" ry="52" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- Stylized # symbol — geometric, bold -->
  <g transform="translate(128, 128)">
    <!-- Left vertical bar -->
    <rect x="-48" y="-68" width="18" height="136" rx="9" fill="url(#accentA)"/>
    <!-- Right vertical bar -->
    <rect x="30" y="-68" width="18" height="136" rx="9" fill="url(#accentA)"/>

    <!-- Top horizontal bar (left half) -->
    <rect x="-48" y="-68" width="50" height="18" rx="9" fill="url(#goldA)"/>
    <!-- Top horizontal bar (right half) -->
    <rect x="30" y="-68" width="50" height="18" rx="9" fill="url(#goldA)"/>
    <!-- Top connector -->
    <rect x="-2" y="-68" width="32" height="10" rx="5" fill="url(#goldA)"/>

    <!-- Bottom horizontal bar (left half) -->
    <rect x="-48" y="50" width="50" height="18" rx="9" fill="url(#goldA)"/>
    <!-- Bottom horizontal bar (right half) -->
    <rect x="30" y="50" width="50" height="18" rx="9" fill="url(#goldA)"/>
    <!-- Bottom connector -->
    <rect x="-2" y="58" width="32" height="10" rx="5" fill="url(#goldA)"/>

    <!-- Tilt the # slightly for dynamic feel -->
    <animateTransform attributeName="transform" type="rotate" from="0" to="0" dur="1s" fill="freeze"/>
  </g>

  <!-- For static version, remove animation and use this transform -->
  <!-- <g transform="translate(128, 128) rotate(-4)"> ... </g> -->
</svg>
