    <!-- Right V -->
    <path d="M 40,-60 L 46,-60 L 46,-26 L 22,50 L 6,50 L 6,26 Z" fill="#339AE8"/>

    <!-- Top gold line -->
    <rect x="-76" y="-68" width="152" height="4" rx="2" fill="#D4881E"/>
    <!-- Bottom gold line -->
    <rect x="-76" y="54" width="152" height="4" rx="2" fill="#D4881E"/>

    <!-- # drawn with paths — slanted via italic geometry, compact -->
