<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFEFA"/>
      <stop offset="100%" stop-color="#FFF3D8"/>
    </linearGradient>
  </defs>

  <rect x="14" y="14" width="228" height="228" rx="54" ry="54" fill="url(#bg2)"/>
  <rect x="16" y="16" width="224" height="224" rx="52" ry="52" fill="none" stroke="#EAD7B2" stroke-width="1.5"/>

  <g transform="translate(128, 131)">

    <!-- Left stem -->
    <path d="M -58,-60 L -40,-60 L -40,50 L -58,50 Z" fill="#072444"/>
    <!-- Right stem -->
