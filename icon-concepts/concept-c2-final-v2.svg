      <!-- Left vertical — angled -->
      <path d="M -4.5,-10 L -2,-8 L 1,6 L -1.5,4 Z"/>
      <!-- Right vertical — angled -->
      <path d="M 1.5,-10 L 4,-8 L 7,6 L 4.5,4 Z"/>
      <!-- Top horizontal — angled -->
