<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1B2E"/>
      <stop offset="100%" stop-color="#2D2844"/>
    </linearGradient>
    <linearGradient id="hashTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="hashBottom" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="224" height="224" rx="56" ry="56" fill="url(#bgD)"/>

  <!-- Subtle inner ring -->
  <rect x="20" y="20" width="216" height="216" rx="52" ry="52" fill="none" stroke="rgba(245,158,11,0.08)" stroke-width="1"/>

  <!-- Stylized # — bold, centered, with elegant proportions -->
  <g transform="translate(128, 126)">
    <!-- Vertical bars -->
    <rect x="-52" y="-70" width="22" height="140" rx="11" fill="rgba(255,255,255,0.92)"/>
    <rect x="30" y="-70" width="22" height="140" rx="11" fill="rgba(255,255,255,0.92)"/>

    <!-- Top horizontal bars with golden gradient -->
    <rect x="-52" y="-70" width="56" height="22" rx="11" fill="url(#hashTop)"/>
    <rect x="30" y="-70" width="56" height="22" rx="11" fill="url(#hashTop)"/>

    <!-- Bottom horizontal bars -->
    <rect x="-52" y="48" width="56" height="22" rx="11" fill="url(#hashBottom)"/>
    <rect x="30" y="48" width="56" height="22" rx="11" fill="url(#hashBottom)"/>

    <!-- Center connector ligature -->
    <rect x="-8" y="-70" width="16" height="22" rx="8" fill="#EAB308"/>
    <rect x="-8" y="48" width="16" height="22" rx="8" fill="#EAB308"/>
  </g>

  <!-- Subtle markdown indicator dots -->
  <circle cx="192" cy="192" r="3" fill="rgba(245,158,11,0.3)"/>
  <circle cx="192" cy="200" r="3" fill="rgba(245,158,11,0.2)"/>
  <circle cx="192" cy="208" r="3" fill="rgba(245,158,11,0.1)"/>
</svg>
