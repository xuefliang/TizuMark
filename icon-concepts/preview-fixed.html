<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>markflow · 修正 #</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F5F1E8; color: #2D2A24; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; padding: 40px; }
  h1 { text-align: center; font-size: 26px; font-weight: 300; letter-spacing: 3px; color: #1A1814; margin-bottom: 6px; }
  .subtitle { text-align: center; color: #8B8578; margin-bottom: 40px; font-size: 13px; }
  .preview-area { max-width: 520px; margin: 0 auto; background: #FFF; border-radius: 16px; padding: 40px; text-align: center; border: 1px solid #EBE5D8; }
  .preview-area .label { font-size: 13px; font-weight: 600; letter-spacing: 1.5px; color: #6B6456; margin-bottom: 24px; }
  .sizes { display: flex; gap: 20px; align-items: flex-end; justify-content: center; margin-top: 24px; }
  .size-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .size-item span { font-size: 10px; color: #A09888; }
  .diagram { margin-top: 24px; padding: 16px; background: #FAF8F3; border-radius: 8px; font-family: monospace; font-size: 11px; color: #6B6456; line-height: 1.8; text-align: left; }
  .diagram .good { color: #059669; }
  .footer { text-align: center; margin-top: 32px; color: #A09888; font-size: 12px; }
</style>
</head>
<body>
<h1>markflow — 修正 #</h1>
<p class="subtitle">横杠 4px 高 · 无圆角 · 四个方向全部盖过竖线</p>

<div class="preview-area">
  <div class="label">concept-c2-fixed</div>
  <img src="concept-c2-fixed.svg" width="256" height="256" alt="icon">
  <div class="sizes">
    <div class="size-item"><img src="concept-c2-fixed.svg" width="128"><span>128px</span></div>
    <div class="size-item"><img src="concept-c2-fixed.svg" width="64"><span>64px</span></div>
    <div class="size-item"><img src="concept-c2-fixed.svg" width="32"><span>32px</span></div>
    <div class="size-item"><img src="concept-c2-fixed.svg" width="20"><span>20px</span></div>
  </div>
  <div class="diagram">
    竖线 3×10, x:[-4,1] y:[-8,2]<br>
    横杠 <span class="good">4×10</span>, x:[-5,5] <span class="good">无圆角</span><br>
    上横 y:[-11,-7] → <span class="good">压住竖顶(-8) ✓</span><br>
    下横 y:[1,5] → <span class="good">包住竖底(2) ✓</span><br>
    左右各超出 1px <span class="good">✓</span>
  </div>
</div>

<p class="footer">确认即可替换到软件</p>
</body>
</html>
