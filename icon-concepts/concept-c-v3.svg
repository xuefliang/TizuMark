<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgV3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1C1E"/>
      <stop offset="100%" stop-color="#25282B"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="224" height="224" rx="54" ry="54" fill="url(#bgV3)"/>

  <!--
    Bold architectural M — inspired by type design
    Three overlapping planes with a golden accent
  -->
  <g transform="translate(128, 130)">

    <!-- Shadow/overlap effect for depth -->
    <g opacity="0.3">
      <polygon points="-6,26 6,26 40,-60 54,-60 54,50 40,50" fill="#000"/>
    </g>

    <!-- LEFT MAST -->
    <rect x="-58" y="-64" width="20" height="114" rx="2" fill="#F4F1EB"/>

    <!-- RIGHT MAST -->
    <rect x="38" y="-64" width="20" height="114" rx="2" fill="#F4F1EB"/>

    <!-- LEFT DIAGONAL (descending toward center) -->
    <polygon points="-38,-64 -20,-64 -4,28 -4,50 -20,50 -42,4" fill="#D9D3CA"/>

    <!-- RIGHT DIAGONAL (descending from center) -->
    <polygon points="20,-64 38,-64 42,4 20,50 4,50 4,28" fill="#E3DED6"/>

    <!-- CENTER V-NOTCH depth shadow -->
    <polygon points="-6,26 6,26 0,16" fill="#C4BDB2"/>

    <!-- GOLDEN ACCENT LINE — top -->
    <rect x="-58" y="-72" width="116" height="3" rx="1.5" fill="#D4A853"/>

    <!-- GOLDEN ACCENT LINE — bottom -->
    <rect x="-58" y="61" width="116" height="3" rx="1.5" fill="#D4A853"/>

    <!-- GOLDEN BREATHER DOT -->
    <circle cx="-4" cy="-6" r="4.5" fill="#D4A853"/>
    <circle cx="4" cy="-6" r="4.5" fill="#D4A853"/>

    <!-- TINY GOLDEN DOT between the two -->
    <circle cx="0" cy="-6" r="2" fill="#B8923E"/>
  </g>
</svg>
