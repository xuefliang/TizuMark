      <stop offset="0%" stop-color="#FFFEFB"/>
      <stop offset="100%" stop-color="#FFF2D5"/>
    </linearGradient>
  </defs>

  <!-- Rounded square -->
  <rect x="14" y="14" width="228" height="228" rx="54" ry="54" fill="url(#bg3)"/>
  <rect x="16" y="16" width="224" height="224" rx="52" ry="52" fill="none" stroke="#EBD9B5" stroke-width="1.5"/>

  <!-- Geometric M -->
  <g transform="translate(128, 130)">

    <!-- Left stem — deeper -->
