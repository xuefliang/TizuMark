<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFEFA"/>
      <stop offset="100%" stop-color="#FEF3DE"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background with subtle warmth -->
  <rect x="10" y="10" width="236" height="236" rx="54" ry="54" fill="url(#bg3)"/>

  <!-- Outer border -->
  <rect x="12" y="12" width="232" height="232" rx="52" ry="52" fill="none" stroke="#ECD9B4" stroke-width="1.5"/>

  <!--
    Refined M — large scale within the canvas,
    maximum contrast, chunky geometry for small-size legibility
  -->
  <g transform="translate(128, 127)">

    <!-- LEFT MAST -->
    <path d="M -57,-72 L -33,-72 L -33,60 L -57,60 Z" fill="#081E36"/>

    <!-- RIGHT MAST -->
    <path d="M 33,-72 L 57,-72 L 57,60 L 33,60 Z" fill="#081E36"/>

    <!-- LEFT DIAGONAL -->
    <path d="M -33,-72 L -4,38 L -4,60 L -26,58 L -48,-28 Z" fill="#1A5688"/>

    <!-- RIGHT DIAGONAL -->
    <path d="M 33,-72 L 48,-72 L 48,-28 L 26,58 L 4,60 L 4,38 Z" fill="#2E82C8"/>

    <!-- CENTER V bottom triangle — accent blue -->
    <path d="M -4,38 L 4,38 L 0,56 Z" fill="#54AAE0"/>

    <!-- === GOLD ACCENTS === -->

    <!-- Top gold bar — thick, spans full width -->
    <rect x="-76" y="-80" width="152" height="6" rx="3" fill="#D4922A"/>

    <!-- Bottom gold bar -->
    <rect x="-76" y="68" width="152" height="6" rx="3" fill="#D4922A"/>

    <!-- Center gold circle — bold -->
    <circle cx="0" cy="-2" r="8" fill="#D4922A"/>

    <!-- Side gold dots -->
    <circle cx="-47" cy="-2" r="3.5" fill="#D4922A"/>
    <circle cx="47" cy="-2" r="3.5" fill="#D4922A"/>

  </g>
</svg>
