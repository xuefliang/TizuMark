<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="penB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="inkB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="224" height="224" rx="56" ry="56" fill="url(#bgB)"/>

  <!-- Document page shape -->
  <g transform="translate(128, 108)">
    <!-- Page shadow -->
    <rect x="-62" y="-46" width="124" height="124" rx="24" fill="rgba(255,255,255,0.03)"/>
    <!-- Main page -->
    <rect x="-58" y="-50" width="116" height="116" rx="20" fill="rgba(255,255,255,0.06)"/>

    <!-- Text lines on page -->
    <rect x="-36" y="-24" width="54" height="4" rx="2" fill="rgba(255,255,255,0.12)"/>
    <rect x="-36" y="-12" width="72" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="-36" y="0" width="48" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="-36" y="12" width="64" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="-36" y="24" width="36" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>

    <!-- # symbol on page (markdown indicator) -->
    <text x="-36" y="-30" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#38BDF8">#</text>
  </g>

  <!-- Pen nib emerging from bottom right -->
  <g transform="translate(164, 166) rotate(-35)">
    <path d="M 0,-14 C -8,-4 -14,10 -14,24 C -14,32 -8,36 0,28 C 8,36 14,32 14,24 C 14,10 8,-4 0,-14 Z" fill="url(#penB)"/>
    <!-- Ink tip -->
    <circle cx="0" cy="26" r="2.5" fill="url(#inkB)"/>
    <!-- Center slit -->
    <line x1="0" y1="-10" x2="0" y2="22" stroke="#0F172A" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
