<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111318"/>
      <stop offset="100%" stop-color="#1C1F26"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="224" height="224" rx="56" ry="56" fill="url(#bgMain)"/>

  <!-- Subtle inner border ring -->
  <rect x="20" y="20" width="216" height="216" rx="52" ry="52" fill="none" stroke="#3A3D48" stroke-width="1"/>

  <!--
    Artistic M — constructed from overlapping geometric planes
    Like a folded ribbon or architectural monogram
  -->
  <g transform="translate(128, 134)">

    <!-- LEFT STEM — tall vertical block -->
    <path d="M -58,-60 L -40,-60 L -40,50 L -58,50 Z" fill="#E8E4DE"/>

    <!-- RIGHT STEM — tall vertical block -->
    <path d="M 40,-60 L 58,-60 L 58,50 L 40,50 Z" fill="#E8E4DE"/>

    <!-- MIDDLE V — left descending stroke -->
    <path d="M -40,-60 L -6,26 L -6,50 L -22,50 L -46,-26 L -46,-60 Z" fill="#C4BBAF"/>

    <!-- MIDDLE V — right descending stroke -->
    <path d="M 40,-60 L 46,-60 L 46,-26 L 22,50 L 6,50 L 6,26 Z" fill="#D4CCC2"/>

    <!-- TOP ACCENT — thin horizontal cut line (adds sophistication) -->
    <rect x="-76" y="-68" width="152" height="4" rx="2" fill="#C9A96E"/>

    <!-- BOTTOM ACCENT — thin horizontal cut line -->
    <rect x="-76" y="54" width="152" height="4" rx="2" fill="#C9A96E"/>

    <!-- CENTER DOT — breather detail -->
    <circle cx="0" cy="-4" r="5" fill="#C9A96E"/>

  </g>
</svg>
