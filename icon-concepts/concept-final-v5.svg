<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFEF9"/>
      <stop offset="100%" stop-color="#FFF3DD"/>
    </linearGradient>
  </defs>

  <!-- Rounded square -->
  <rect x="12" y="12" width="232" height="232" rx="54" ry="54" fill="url(#bg5)"/>
  <rect x="14" y="14" width="228" height="228" rx="52" ry="52" fill="none" stroke="#EAD6AE" stroke-width="1.5"/>

  <!-- Single # watermark — upper-right corner -->
  <g transform="translate(168, 58)" opacity="0.05">
    <rect x="0" y="0" width="15" height="120" rx="7" fill="#0A2540"/>
    <rect x="46" y="0" width="15" height="120" rx="7" fill="#0A2540"/>
    <rect x="-12" y="12" width="84" height="15" rx="7" fill="#0A2540"/>
    <rect x="-12" y="93" width="84" height="15" rx="7" fill="#0A2540"/>
  </g>

  <!-- Clean M — vivid blue with warm orange accent -->
  <g transform="translate(128, 126)">

    <!-- Left mast -->
    <rect x="-46" y="-58" width="20" height="112" rx="2" fill="#0D2C4A"/>

    <!-- Right mast -->
    <rect x="26" y="-58" width="20" height="112" rx="2" fill="#0D2C4A"/>

    <!-- Left V — vibrant blue -->
    <path d="M -26,-58 L -3,28 L -3,54 L -21,54 L -40,-14 Z" fill="#226DB8"/>

    <!-- Right V — bright blue -->
    <path d="M 26,-58 L 40,-58 L 40,-14 L 21,54 L 3,54 L 3,28 Z" fill="#3B9CD8"/>

    <!-- V bottom — light blue -->
    <path d="M -3,28 L 3,28 L 0,42 Z" fill="#6EBEF0"/>

    <!-- Single warm accent dot — orange/coral -->
    <circle cx="0" cy="-6" r="4.5" fill="#E87830"/>

  </g>
</svg>
