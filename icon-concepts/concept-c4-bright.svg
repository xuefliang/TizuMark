<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background — fresh green tint -->
  <rect x="16" y="16" width="224" height="224" rx="56" ry="56" fill="url(#bgC)"/>
  <rect x="18" y="18" width="220" height="220" rx="54" ry="54" fill="none" stroke="#BBF7D0" stroke-width="1"/>

  <!-- Minimalist Bauhaus M -->
  <g transform="translate(128, 128)">

    <!-- Left vertical -->
    <rect x="-60" y="-64" width="24" height="116" rx="2" fill="#166534"/>

    <!-- Right vertical -->
    <rect x="36" y="-64" width="24" height="116" rx="2" fill="#166534"/>

    <!-- Left descender -->
    <path d="M -36,-64 L -12,30 L -12,52 L -30,52 L -50,-20 L -50,-64 Z" fill="#15803D"/>

    <!-- Right descender -->
    <path d="M 36,-64 L 50,-64 L 50,-20 L 30,52 L 12,52 L 12,30 Z" fill="#22C55E"/>

    <!-- Center peak -->
    <polygon points="-12,30 12,30 0,44" fill="#4ADE80"/>

    <!-- Mini # markdown accent -->
    <g transform="translate(72, 34)" opacity="0.35">
      <rect x="0" y="0" width="3" height="12" rx="1" fill="#166534"/>
      <rect x="7" y="0" width="3" height="12" rx="1" fill="#166534"/>
      <rect x="0" y="3" width="10" height="2.5" rx="1" fill="#166534"/>
      <rect x="0" y="8" width="10" height="2.5" rx="1" fill="#166534"/>
    </g>
  </g>
</svg>
