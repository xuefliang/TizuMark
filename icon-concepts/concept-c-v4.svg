<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgV4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17191C"/>
      <stop offset="100%" stop-color="#202326"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="224" height="224" rx="56" ry="56" fill="url(#bgV4)"/>

  <!--
    Minimalist architectural M
    Inspired by Dieter Rams / Bauhaus principles
    Pure geometry, no decoration
  -->
  <g transform="translate(128, 128)">

    <!--
      The M is built from 4 rectangular blocks
      that read as an M through negative space
    -->

    <!-- LEFT VERTICAL -->
    <rect x="-60" y="-64" width="24" height="116" rx="2" fill="#EEEAE3"/>

    <!-- RIGHT VERTICAL -->
    <rect x="36" y="-64" width="24" height="116" rx="2" fill="#EEEAE3"/>

    <!-- LEFT DESCENDER (V shape left side) -->
    <path d="M -36,-64 L -12,30 L -12,52 L -30,52 L -50,-20 L -50,-64 Z" fill="#C8C1B5"/>

    <!-- RIGHT DESCENDER (V shape right side) -->
    <path d="M 36,-64 L 50,-64 L 50,-20 L 30,52 L 12,52 L 12,30 Z" fill="#DBD5CB"/>

    <!-- CENTER PEAK (the V bottom) -->
    <polygon points="-12,30 12,30 0,44" fill="#B5AEA1"/>

    <!--
      MARKDOWN ACCENT:
      A tiny # shape in negative space at bottom right
      — subtle wink to markdown
    -->
    <g transform="translate(72, 36)" opacity="0.25">
      <rect x="0" y="0" width="3" height="12" rx="1" fill="#EEEAE3"/>
      <rect x="7" y="0" width="3" height="12" rx="1" fill="#EEEAE3"/>
      <rect x="0" y="3" width="10" height="2.5" rx="1" fill="#EEEAE3"/>
      <rect x="0" y="8" width="10" height="2.5" rx="1" fill="#EEEAE3"/>
    </g>
  </g>
</svg>
