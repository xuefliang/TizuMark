<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFDF7"/>
      <stop offset="100%" stop-color="#FFF4D5"/>
    </linearGradient>
  </defs>

  <!-- Rounded square -->
  <rect x="14" y="14" width="228" height="228" rx="54" ry="54" fill="url(#bg)"/>
  <rect x="16" y="16" width="224" height="224" rx="52" ry="52" fill="none" stroke="#E8D5B0" stroke-width="1.5"/>

  <!-- Geometric M -->
  <g transform="translate(128, 132)">

    <!-- Left stem -->
    <path d="M -58,-60 L -40,-60 L -40,50 L -58,50 Z" fill="#0B2D4F"/>

    <!-- Right stem -->
    <path d="M 40,-60 L 58,-60 L 58,50 L 40,50 Z" fill="#0B2D4F"/>

    <!-- Left V — brighter blue -->
    <path d="M -40,-60 L -6,26 L -6,50 L -22,50 L -46,-26 L -46,-60 Z" fill="#1A6AB5"/>

    <!-- Right V — vivid blue -->
    <path d="M 40,-60 L 46,-60 L 46,-26 L 22,50 L 6,50 L 6,26 Z" fill="#2E90E0"/>

    <!-- Top gold line -->
    <rect x="-76" y="-68" width="152" height="4" rx="2" fill="#D4922A"/>

    <!-- Bottom gold line -->
    <rect x="-76" y="54" width="152" height="4" rx="2" fill="#D4922A"/>

    <!-- Center # symbol (replacing the dot) -->
    <g transform="translate(0, -3)" fill="#D4922A">
      <rect x="-7" y="-10" width="3.5" height="16" rx="1.5"/>
      <rect x="3.5" y="-10" width="3.5" height="16" rx="1.5"/>
      <rect x="-7" y="-5" width="14" height="3.5" rx="1.5"/>
      <rect x="-7" y="2" width="14" height="3.5" rx="1.5"/>
    </g>

  </g>
</svg>
