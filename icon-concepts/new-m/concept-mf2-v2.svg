<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="236" height="236" rx="52" ry="52" fill="url(#bg)"/>
  <rect x="12" y="12" width="232" height="232" rx="50" ry="50" fill="none" stroke="#E5E5E5" stroke-width="1.5"/>

  <!-- # watermark — upper-right -->
  <g transform="translate(180, 58)" opacity="0.05" fill="#000">
    <rect x="0" y="0" width="12" height="90" rx="5"/>
    <rect x="36" y="0" width="12" height="90" rx="5"/>
    <rect x="-9" y="9" width="66" height="12" rx="5"/>
    <rect x="-9" y="69" width="66" height="12" rx="5"/>
  </g>

  <!-- M — Bodoni, large, centered -->
  <text x="128" y="132" font-family="'Bodoni MT', Didot, 'Hoefler Text', 'Times New Roman', serif" font-size="150" font-weight="bold" fill="#0D0D0D" text-anchor="middle" dominant-baseline="central">M</text>

  <!-- Flow — small, at bottom -->
  <text x="128" y="220" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="24" font-weight="300" fill="#777" text-anchor="middle" letter-spacing="8">Flow</text>
</svg>
