<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F0EFEC; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 40px; text-align: center; }
  h1 { font-size: 24px; font-weight: 300; letter-spacing: 3px; margin-bottom: 6px; }
  .subtitle { color: #888; margin-bottom: 36px; font-size: 13px; }
  .preview { background: #FFF; border-radius: 16px; padding: 40px; max-width: 480px; margin: 0 auto; border: 1px solid #E5E0D8; }
  .row { display: flex; gap: 18px; justify-content: center; margin-top: 20px; align-items: flex-end; }
  .sz { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .sz span { font-size: 9px; color: #BBB; }
  .info { margin-top: 20px; padding: 12px; background: #FAF9F7; border-radius: 8px; font-size: 11px; color: #888; line-height: 1.6; }
  .info b { color: #333; }
  .footer { margin-top: 32px; color: #BBB; font-size: 11px; }
</style>
</head>
<body>
<h1>markflow — 最终版</h1>
<p class="subtitle">白底 · Bodoni M 180px · # 8px/56px 右上 · Flow 底部居中</p>

<div class="preview">
  <img src="concept-mf2-v3.svg" width="256" height="256">
  <div class="row">
    <div class="sz"><img src="concept-mf2-v3.svg" width="128"><span>128px</span></div>
    <div class="sz"><img src="concept-mf2-v3.svg" width="64"><span>64px</span></div>
    <div class="sz"><img src="concept-mf2-v3.svg" width="32"><span>32px</span></div>
    <div class="sz"><img src="concept-mf2-v3.svg" width="20"><span>20px</span></div>
  </div>
  <div class="info">
    <b>M</b> Bodoni 180px · <b>#</b> 8px条 56px高 9% 右上 · <b>Flow</b> 22px 字间距10 · <b>底色</b> 纯白
  </div>
</div>

<p class="footer">确认后替换到软件中</p>
</body>
</html>
