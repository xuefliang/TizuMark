<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F9F9F9"/>
    </linearGradient>
  </defs>

  <rect x="12" y="12" width="232" height="232" rx="54" ry="54" fill="url(#bg)"/>
  <rect x="14" y="14" width="228" height="228" rx="52" ry="52" fill="none" stroke="#E5E5E5" stroke-width="1.5"/>

  <!-- # watermark — upper-right -->
  <g transform="translate(182, 55)" opacity="0.05" fill="#000">
    <rect x="0" y="0" width="12" height="95" rx="5"/>
    <rect x="36" y="0" width="12" height="95" rx="5"/>
    <rect x="-9" y="9" width="66" height="12" rx="5"/>
    <rect x="-9" y="74" width="66" height="12" rx="5"/>
  </g>

  <!-- M — Georgia, large, centered -->
  <text x="128" y="126" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="bold" fill="#111" text-anchor="middle">M</text>

  <!-- Flow — smaller, elegant, below M -->
  <text x="128" y="182" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="400" fill="#333" text-anchor="middle" letter-spacing="4">Flow</text>
</svg>
