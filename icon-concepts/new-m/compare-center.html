<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F0EFEC; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 40px; }
  h1 { text-align: center; font-size: 24px; font-weight: 300; letter-spacing: 3px; margin-bottom: 4px; }
  .subtitle { text-align: center; color: #888; margin-bottom: 32px; font-size: 13px; }
  .compare { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 900px; margin: 0 auto; }
  .card { background: #FFF; border-radius: 14px; padding: 28px 18px; text-align: center; border: 1px solid #E5E0D8; }
  .label { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
  .desc { font-size: 11px; color: #999; margin-bottom: 16px; }
  .card img { width: 200px; height: 200px; }
  .row { display: flex; gap: 10px; justify-content: center; margin-top: 14px; align-items: flex-end; }
  .row img { width: 64px; height: 64px; }
  .row img.small { width: 32px; height: 32px; }
  .verdict { margin-top: 14px; font-size: 12px; padding: 8px 14px; border-radius: 6px; display: inline-block; }
  .verdict.up { background: #FFF5F5; color: #C55; }
  .verdict.mid { background: #FFFDEB; color: #A90; }
  .verdict.ctr { background: #F0FFF4; color: #3A3; }
  .footer { text-align: center; margin-top: 32px; color: #BBB; font-size: 11px; }
</style>
</head>
<body>
<h1>M 垂直居中对比</h1>
<p class="subtitle">Bodoni M 180px · # 8px/56px 右上 · Flow 底部 · 红色虚线 = 几何中心 y=128</p>

<div class="compare">
  <div class="card">
    <div class="label">V3 · y=120</div>
    <div class="desc">偏上 8px</div>
    <img src="concept-mf2-v3.svg">
    <div class="row">
      <img src="concept-mf2-v3.svg">
      <img class="small" src="concept-mf2-v3.svg">
    </div>
    <div class="verdict up">M 偏上</div>
  </div>
  <div class="card">
    <div class="label">V3b-alt · y=124</div>
    <div class="desc">偏上 4px</div>
    <img src="concept-mf2-v3b-alt.svg">
    <div class="row">
      <img src="concept-mf2-v3b-alt.svg">
      <img class="small" src="concept-mf2-v3b-alt.svg">
    </div>
    <div class="verdict mid">M 略偏上</div>
  </div>
  <div class="card">
    <div class="label">V3c-alt · y=128</div>
    <div class="desc">正好居中</div>
    <img src="concept-mf2-v3c-alt.svg">
    <div class="row">
      <img src="concept-mf2-v3c-alt.svg">
      <img class="small" src="concept-mf2-v3c-alt.svg">
    </div>
    <div class="verdict ctr">M 几何居中 ✓</div>
  </div>
</div>

<p class="footer">红色虚线 y=128 是图标几何中心（256÷2）</p>
</body>
</html>
