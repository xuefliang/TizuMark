<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F0EFEC; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 40px; }
  h1 { text-align: center; font-size: 24px; font-weight: 300; letter-spacing: 3px; margin-bottom: 6px; }
  .subtitle { text-align: center; color: #888; margin-bottom: 36px; font-size: 13px; }
  .concepts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 780px; margin: 0 auto; }
  .card { background: #FFF; border-radius: 14px; padding: 24px 16px; text-align: center; border: 1px solid #E5E0D8; }
  .label { font-size: 12px; font-weight: 600; letter-spacing: 1.5px; color: #999; margin-bottom: 18px; }
  .row { display: flex; gap: 12px; align-items: center; justify-content: center; margin-top: 8px; }
  .sz { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .sz span { font-size: 9px; color: #BBB; }
  img[src$="svg"] { width: 130px; height: 130px; }
  .row img { width: 48px; height: 48px; }
  .info { margin-top: 12px; padding: 10px; background: #FAF9F7; border-radius: 8px; font-size: 10px; color: #888; line-height: 1.5; }
  .footer { text-align: center; margin-top: 36px; color: #BBB; font-size: 11px; }
</style>
</head>
<body>
<h1>markflow — 小 # 右上角</h1>
<p class="subtitle">白底 · Bodoni M 170px · Flow 22px · 小 # 右上暗纹</p>

<div class="concepts">
  <div class="card">
    <div class="label">F1 · 10px 条 · 72px 高</div>
    <img src="concept-mf2-final.svg">
    <div class="row"><img src="concept-mf2-final.svg"><img src="concept-mf2-final.svg" style="width:24px;height:24px"><span style="font-size:9px;color:#BBB">64+24</span></div>
    <div class="info">8% 不透明度 · 偏小偏精致</div>
  </div>
  <div class="card">
    <div class="label">F2 · 9px 条 · 60px 高</div>
    <img src="concept-mf2-final2.svg">
    <div class="row"><img src="concept-mf2-final2.svg"><img src="concept-mf2-final2.svg" style="width:24px;height:24px"></div>
    <div class="info">7% 不透明度 · 更小巧收敛</div>
  </div>
  <div class="card">
    <div class="label">F3 · 8px 条 · 56px 高</div>
    <img src="concept-mf2-final3.svg">
    <div class="row"><img src="concept-mf2-final3.svg"><img src="concept-mf2-final3.svg" style="width:24px;height:24px"></div>
    <div class="info">9% 不透明度 · 最小最精致</div>
  </div>
</div>
<p class="footer">全部白底 + Bodoni M + Flow 底部 + 小 # 右上</p>
</body>
</html>
