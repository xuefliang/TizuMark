<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFCF5"/>
      <stop offset="100%" stop-color="#FFF7E6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square -->
  <rect x="12" y="12" width="232" height="232" rx="54" ry="54" fill="url(#bg)"/>
  <rect x="14" y="14" width="228" height="228" rx="52" ry="52" fill="none" stroke="#EAD9B5" stroke-width="1.5"/>

  <!--
    # 暗纹 — large, faint, behind the M
    Acts as a sophisticated background texture
  -->
  <g transform="translate(128, 126)" opacity="0.07">
    <!-- Left vertical of # -->
    <rect x="-78" y="-86" width="20" height="176" rx="6" fill="#0A2540"/>
    <!-- Right vertical of # -->
    <rect x="58" y="-86" width="20" height="176" rx="6" fill="#0A2540"/>
    <!-- Top horizontal of # -->
    <rect x="-62" y="-86" width="104" height="20" rx="6" fill="#0A2540"/>
    <!-- Bottom horizontal of # -->
    <rect x="-62" y="66" width="104" height="20" rx="6" fill="#0A2540"/>
  </g>

  <!--
    M — clean, bold, minimal
    Three planes: left mast, right mast, center V
  -->
  <g transform="translate(128, 128)">

    <!-- LEFT MAST -->
    <rect x="-54" y="-62" width="20" height="116" rx="2" fill="#0A2540"/>

    <!-- RIGHT MAST -->
    <rect x="34" y="-62" width="20" height="116" rx="2" fill="#0A2540"/>

    <!-- LEFT DIAGONAL -->
    <path d="M -34,-62 L -4,30 L -4,54 L -24,54 L -46,-18 Z" fill="#1A5688"/>

    <!-- RIGHT DIAGONAL -->
    <path d="M 34,-62 L 46,-62 L 46,-18 L 24,54 L 4,54 L 4,30 Z" fill="#2E82C8"/>

    <!-- CENTER V PEAK — light accent -->
    <path d="M -4,30 L 4,30 L 0,48 Z" fill="#54AAE0"/>

    <!-- Single gold line — top -->
    <rect x="-68" y="-70" width="136" height="4" rx="2" fill="#C8892A"/>

    <!-- Single gold line — bottom -->
    <rect x="-68" y="62" width="136" height="4" rx="2" fill="#C8892A"/>

  </g>
</svg>
