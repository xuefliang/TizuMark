<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFDF8"/>
      <stop offset="100%" stop-color="#FFF5E3"/>
    </linearGradient>
  </defs>

  <!-- Rounded square -->
  <rect x="12" y="12" width="232" height="232" rx="54" ry="54" fill="url(#bg)"/>
  <rect x="14" y="14" width="228" height="228" rx="52" ry="52" fill="none" stroke="#EAD8B5" stroke-width="1.5"/>

  <!-- Single # watermark — upper-right, barely visible -->
  <g transform="translate(172, 68)" opacity="0.06">
    <rect x="0" y="0" width="14" height="110" rx="7" fill="#0A2540"/>
    <rect x="42" y="0" width="14" height="110" rx="7" fill="#0A2540"/>
    <rect x="-10" y="10" width="76" height="14" rx="7" fill="#0A2540"/>
    <rect x="-10" y="86" width="76" height="14" rx="7" fill="#0A2540"/>
  </g>

  <!-- Clean vibrant M -->
  <g transform="translate(128, 126)">

    <!-- Left mast — deep navy -->
    <rect x="-48" y="-60" width="20" height="114" rx="2" fill="#0A2540"/>

    <!-- Right mast — deep navy -->
    <rect x="28" y="-60" width="20" height="114" rx="2" fill="#0A2540"/>

    <!-- Left V — bright cobalt -->
    <path d="M -28,-60 L -3,30 L -3,54 L -22,54 L -42,-16 Z" fill="#1E6CB8"/>

    <!-- Right V — vivid blue -->
    <path d="M 28,-60 L 42,-60 L 42,-16 L 22,54 L 3,54 L 3,30 Z" fill="#3898D8"/>

    <!-- V bottom — sky accent -->
    <path d="M -3,30 L 3,30 L 0,44 Z" fill="#6BBCF0"/>

  </g>
</svg>
